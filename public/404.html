<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Page Not Found | Building India Digital</title>
    <meta name="robots" content="noindex" />

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #012869;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        text-align: center;
      }
      .box {
        max-width: 500px;
      }
      h1 {
        font-size: 3rem;
        color: #fe8d00;
        margin-bottom: 10px;
      }
      p {
        opacity: 0.8;
        margin-bottom: 20px;
      }
      a {
        display: inline-block;
        padding: 12px 20px;
        background: #fe8d00;
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
      }
      a:hover {
        background: #d47200;
      }
    </style>

    <!-- Redirect back to React app -->
    <script>
      // This fixes React Router refresh issue
      window.location.href = "/";
    </script>
  </head>

  <body>
    <div class="box">
      <h1>404</h1>
      <p>Oops! The page you are looking for does not exist.</p>
      <a href="/">Go to Homepage</a>
    </div>
  </body>
</html>
