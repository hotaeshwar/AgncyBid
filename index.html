<!doctype html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/media/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Building India Digital | Web Development & Digital Marketing Company</title>
    <meta name="description" content="Building India Digital offers web development, SEO, digital marketing, UI/UX design and branding services to grow your business online in India." />
    <meta name="keywords" content="web development India, SEO services India, digital marketing agency India, UI UX design, branding company India" />
    <meta name="author" content="Building India Digital" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.buildingindiadigital.com/" />

    <!-- Open Graph (Facebook / WhatsApp) -->
    <meta property="og:title" content="Building India Digital" />
    <meta property="og:description" content="Grow your business online with expert web development and digital marketing services." />
    <meta property="og:image" content="https://www.buildingindiadigital.com/media/logo.png" />
    <meta property="og:url" content="https://www.buildingindiadigital.com/" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Building India Digital" />
    <meta name="twitter:description" content="Expert web development and digital marketing services." />
    <meta name="twitter:image" content="https://www.buildingindiadigital.com/media/logo.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Theme -->
    <meta name="theme-color" content="#012869" />

    <!-- Preload Logo -->
    <link rel="preload" as="image" href="/media/bid.png" />

    <!-- Structured Data (SEO BOOST) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Building India Digital",
        "url": "https://www.buildingindiadigital.com",
        "logo": "https://www.buildingindiadigital.com/media/logo.png",
        "sameAs": [
          "https://www.facebook.com/profile.php?id=100087588905846",
          "https://www.instagram.com/buildingindiadigital/"
        ]
      }
    </script>
  </head>

  <body>
    <!-- SEO fallback content (VERY IMPORTANT for React apps) -->
    <noscript>
      <h1>Building India Digital</h1>
      <p>
        We provide web development, SEO, digital marketing, and branding services
        to grow your business online.
      </p>
    </noscript>

    <!-- React App -->
    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
